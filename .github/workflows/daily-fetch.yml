name: Daily Data Fetch

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh data from APIs
        run: npm run fetch
        env:
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Validate fetched data
        run: npm run validate

      - name: Create Pull Request with new data
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: daily fetch"
          title: "Daily data refresh"
          body: |
            Automated daily data refresh from external sources.
            - games
            - movies
            - books
            - animals
            - plants
          branch: daily-fetch
          delete-branch: true
          add-paths: data/*.json

